<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profile Image Preview</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; padding: 2rem; background:#f7f7f7; }
    .preview { display:flex; gap:2rem; align-items:center; }
    img { width:200px; height:200px; object-fit:cover; border-radius:50%; border:2px solid #ddd; }
    .meta { max-width:600px; }
    .meta p { margin:0.25rem 0; }
  </style>
</head>
<body>
  <h2>Profile Image Preview</h2>
  <div class="preview">
    <img id="previewImg" src="images/profile-pictures/profile.jpeg?t=1" alt="profile preview">
    <div class="meta">
      <p><strong>Path:</strong> <code>frontend/images/profile-pictures/profile.jpeg</code></p>
      <p><strong>Direct URL:</strong> <a href="/cpmr_library/frontend/images/profile-pictures/profile.jpeg" target="_blank">/cpmr_library/frontend/images/profile-pictures/profile.jpeg</a></p>
      <p>If the image looks old, press <strong>Ctrl+F5</strong> to force refresh.</p>
      <p><button onclick="document.getElementById('previewImg').src='images/profile-pictures/profile.jpeg?t='+Time.now()">Reload Preview</button></p>
    </div>
  </div>
</body>
</html>
