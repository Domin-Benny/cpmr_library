<!DOCTYPE html>
<html>
<head>
    <title>Database Migration: Add 'Other' Role</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 20px;
            background: #f9f9f9;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        pre {
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Database Migration: Add 'Other' Role</h1>
        <p>This script will update the database to support the 'Other' role for user registration.</p>
        <p><strong>Current Issue:</strong> The role ENUM in the users table doesn't include 'Other', preventing users from registering with this role.</p>
        <p><strong>Solution:</strong> Update the ENUM to include 'Other'</p>
        
        <button onclick="runMigration()">Run Migration</button>
        
        <div id="result"></div>
    </div>

    <script>
        async function runMigration() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Running migration...';
            resultDiv.style.display = 'block';
            resultDiv.className = '';
            
            try {
                const response = await fetch('./run_migration.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = '<strong>✓ Migration Successful!</strong><br>' + 
                                        data.message + 
                                        '<pre>' + data.output + '</pre>';
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = '<strong>✗ Migration Failed!</strong><br>' + 
                                        data.message + 
                                        '<pre>' + data.output + '</pre>';
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = '<strong>✗ Error:</strong><br>' + error.message;
            }
        }
    </script>
</body>
</html>
